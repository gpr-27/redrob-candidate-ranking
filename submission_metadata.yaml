ai_usage_summary: |
  Used Claude (Antigravity IDE) for architecture discussion, scoring component
  design, code implementation, and quality review. All candidate data processing
  and ranking logic was designed and validated through iterative engineering.
  No candidate data was fed to any LLM for ranking purposes.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic rule-based ranker with 7 weighted scoring components and
  multi-signal honeypot detection. Title+Career (50% combined) is the
  decisive signal — encodes the JD's anti-keyword-stuffing philosophy.
  Skills scorer values quality (proficiency × duration) over quantity, so
  "expert with 0 months" scores zero. Behavioral scorer weights recency,
  recruiter response rate, and notice period as hireability signals.
  Honeypot detector catches impossible profiles: employment predating
  company founding (checked against real founding years), stated experience
  exceeding the career timeline, summary/field experience contradictions,
  and expert-zero-duration skill patterns. Post-run audit confirms 0
  impossible profiles in the top-100. Runtime: ~10 seconds for 100K
  candidates on CPU, ~1.8 GB peak RAM. Zero external dependencies —
  Python standard library only.

